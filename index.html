<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILARIO PLACANICA</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Futura', sans-serif;
        }
        nav {
            display: flex;
            gap: 20px;
        }
        nav a {
            text-decoration: none;
            color: #ff4500;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #ffa500;
        }
        .hero {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60vh;
            text-align: center;
            background: linear-gradient(to bottom right, #ff4500, #ff7f50);
        }
        .hero h1 {
            font-size: 48px;
            margin: 0;
        }
        .project-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
        }
        .card {
            background: #111;
            border: 1px solid #ff4500;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #222;
        }
    </style>
</head>
<body>
    <header>
        <div>ILARIO PLACANICA</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Projects</a>
            <a href="#">Get in touch</a>
        </nav>
    </header>
    <section class="hero">
        <h1>Hey, I'm a 3D Visualizer</h1>
    </section>
    <div class="project-cards">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
        <div class="card">Project 4</div>
    </div>
    <footer>
        &copy; 2026 ILARIO PLACANICA
    </footer>
</body>
</html>
